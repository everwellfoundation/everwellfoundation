backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "foundation"
    label: "Foundation Work"
    folder: "_posts/foundation"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Category", name: "category", widget: "hidden", default: "foundation"}
      - label: "Greeting"
        name: "greeting"
        widget: "select"
        hint: "Appears after 'as ever,' in the sign off"
        options:
          - {label: "you're beautiful", value: "you're beautiful"}
          - {label: "and with love", value: "and with love"}
          - {label: "Yours", value: "Yours"}
          - {label: "All the best", value: "All the best"}
          - {label: "Cheers", value: "Cheers"}
          - {label: "Always", value: "Always"}
          - {label: "Blank (as ever only)", value: "blank"}
      - label: "Initial"
        name: "initial"
        widget: "select"
        hint: "Who is writing this post?"
        options:
          - {label: "Aj", value: "Aj"}
          - {label: "Ad", value: "Ad"}
          - {label: "S", value: "S"}
      - {label: "Featured Image", name: "featured_image", widget: "image", required: false, hint: "Main cover image shown at the top of the post"}
      - {label: "Excerpt", name: "excerpt", widget: "text"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "travels"
    label: "Life & Travels"
    folder: "_posts/travels"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Category", name: "category", widget: "hidden", default: "travels"}
      - label: "Greeting"
        name: "greeting"
        widget: "select"
        hint: "Appears after 'as ever,' in the sign off"
        options:
          - {label: "you're beautiful", value: "you're beautiful"}
          - {label: "and with love", value: "and with love"}
          - {label: "Yours", value: "Yours"}
          - {label: "All the best", value: "All the best"}
          - {label: "Cheers", value: "Cheers"}
          - {label: "Always", value: "Always"}
          - {label: "Blank (as ever only)", value: "blank"}
      - label: "Initial"
        name: "initial"
        widget: "select"
        hint: "Who is writing this post?"
        options:
          - {label: "Aj", value: "Aj"}
          - {label: "Ad", value: "Ad"}
          - {label: "S", value: "S"}
      - {label: "Featured Image", name: "featured_image", widget: "image", required: false, hint: "Main cover image shown at the top of the post"}
      - {label: "Excerpt", name: "excerpt", widget: "text"}
      - {label: "Body", name: "body", widget: "markdown"}
